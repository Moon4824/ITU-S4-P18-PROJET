<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SysInfo — Inscription (2/2)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <h1>SysInfo</h1>
        <span>Inscription — étape 2/2</span>
      </div>
    </div>

    <h2>Informations supplémentaires</h2>
    <p class="subtitle">Renseignez vos données personnelles</p>

    <form onsubmit="registerStep2(event)">
      <div class="field-group">
        <label>Poids (kg)</label>
        <div class="input-wrap">
          <input id="poids" type="number" step="0.1" placeholder="Ex : 72.5" required />
        </div>
      </div>

      <div class="field-group">
        <label>Taille (cm)</label>
        <div class="input-wrap">
          <input id="taille" type="number" placeholder="Ex : 175" required />
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:8px">
        <a href="inscription1.html" class="btn btn-secondary btn-full">Précédent</a>
        <button type="submit" class="btn btn-primary btn-full">Terminer</button>
      </div>
    </form>

    <div class="login-footer">
      Après validation, vous serez redirigé vers la page de connexion.
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
